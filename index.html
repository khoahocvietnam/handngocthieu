<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Glass Effects</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #6366f1;
            --accent:  #a78bfa;
            --bg:      #0a0a12;
            --glass-border: rgba(255,255,255,0.75);
            --snap-ring: #6366f1;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            gap: 16px;
            transition: opacity 0.6s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }

        .spinner {
            width: 52px; height: 52px;
            border: 4px solid rgba(255,255,255,0.08);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #loading h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.7);
        }

        #error-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            gap: 12px;
            text-align: center;
            padding: 32px;
        }
        #error-screen.visible { display: flex; }
        #error-screen .icon { font-size: 3rem; }
        #error-screen h2 { margin: 0; font-size: 1.3rem; color: #f87171; }
        #error-screen p { margin: 0; color: rgba(255,255,255,0.5); font-size: 0.9rem; max-width: 340px; }

        .video-container {
            position: relative;
            width: 100vw; height: 100vh;
        }
        .input_video { display: none; }
        .output_canvas {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            cursor: pointer;
        }

        #hud {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            transition: opacity 0.5s;
        }
        #hud.hidden { opacity: 0; pointer-events: none; }

        .gesture-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.8);
            font-size: 0.78rem;
            white-space: nowrap;
        }
        .gesture-card .emoji { font-size: 1.3rem; }
        .gesture-card .label { line-height: 1.3; }
        .gesture-card .label b { display: block; font-size: 0.85rem; color: #fff; font-weight: 600; }

        #gesture-tag {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(99, 102, 241, 0.25);
            border: 1px solid rgba(99, 102, 241, 0.5);
            backdrop-filter: blur(8px);
            color: #fff;
            padding: 5px 16px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.25s;
        }
        #gesture-tag.visible { opacity: 1; }

        #clear-hint {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.35);
            font-size: 0.72rem;
            z-index: 10;
            letter-spacing: 0.05em;
            line-height: 1.7;
            text-align: right;
        }

        #save-toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            backdrop-filter: blur(8px);
            color: #86efac;
            padding: 8px 20px;
            border-radius: 99px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }
        #save-toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <h2>Khởi động nhận diện tay...</h2>
</div>

<div id="error-screen">
    <div class="icon">📷</div>
    <h2>Không thể truy cập Camera</h2>
    <p>Vui lòng cho phép truy cập camera trong cài đặt trình duyệt rồi tải lại trang.</p>
</div>

<div class="video-container">
    <video class="input_video" autoplay playsinline></video>
    <canvas class="output_canvas" width="1280" height="720"></canvas>
</div>

<div id="hud">
    <div class="gesture-card">
        <span class="emoji">🖖</span>
        <span class="label"><b>Tam giác</b>1 tay: cái + trỏ + giữa</span>
    </div>
    <div class="gesture-card">
        <span class="emoji">👆</span>
        <span class="label"><b>L-Frame</b>2 tay → Tứ giác 3D</span>
    </div>
    <div class="gesture-card">
        <span class="emoji">🤙</span>
        <span class="label"><b>Vòng tròn</b>2 tay: cái + trỏ + út, kéo dãn</span>
    </div>
</div>

<div id="gesture-tag"></div>
<div id="save-toast">✓ Đã lưu ảnh!</div>
<div id="clear-hint">Nhấn màn hình để xóa<br>[Space] để chụp & lưu</div>

<script>
    const videoEl      = document.querySelector('.input_video');
    const canvasEl     = document.querySelector('.output_canvas');
    const ctx          = canvasEl.getContext('2d');
    const loadingEl    = document.getElementById('loading');
    const errorEl      = document.getElementById('error-screen');
    const hudEl        = document.getElementById('hud');
    const gestureTagEl = document.getElementById('gesture-tag');
    const saveToastEl  = document.getElementById('save-toast');

    const frozenCanvas = document.createElement('canvas');
    const frozenCtx    = frozenCanvas.getContext('2d');

    let frozenGlass  = null;
    let activeGlass  = null;
    let snapTimer    = 0;
    let lastPos      = null;
    let isCooldown   = false;
    let flashFrames  = 0;
    let lastGesture  = null;

    const SNAP_DELAY          = 2000;
    const STABILITY_THRESHOLD = 80;

    canvasEl.addEventListener('click', () => {
        frozenGlass = null;
        hudEl.classList.remove('hidden');
    });

    // Space: chụp canvas hiện tại và lưu về máy (ảnh gương theo màn hình)
    let toastTimer = null;
    document.addEventListener('keydown', e => {
        if (e.code !== 'Space') return;
        e.preventDefault();
        const save = document.createElement('canvas');
        save.width  = canvasEl.width;
        save.height = canvasEl.height;
        const sCtx = save.getContext('2d');
        sCtx.translate(save.width, 0);
        sCtx.scale(-1, 1);
        sCtx.drawImage(canvasEl, 0, 0);
        const link = document.createElement('a');
        link.download = `glass-${Date.now()}.png`;
        link.href = save.toDataURL('image/png');
        link.click();
        saveToastEl.classList.add('visible');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => saveToastEl.classList.remove('visible'), 2000);
    });

    // Vẽ đường viền hình (dùng chung cho tất cả gesture)
    function buildPath(glass) {
        ctx.beginPath();
        if (glass.type === 'triangle') {
            ctx.moveTo(glass.p1.x, glass.p1.y);
            ctx.lineTo(glass.p2.x, glass.p2.y);
            ctx.lineTo(glass.p3.x, glass.p3.y);
        } else if (glass.type === 'quad') {
            ctx.moveTo(glass.tl.x, glass.tl.y);
            ctx.lineTo(glass.tr.x, glass.tr.y);
            ctx.lineTo(glass.br.x, glass.br.y);
            ctx.lineTo(glass.bl.x, glass.bl.y);
        } else if (glass.type === 'circle') {
            ctx.ellipse(glass.cx, glass.cy, glass.rx, glass.ry, glass.angle, 0, Math.PI * 2);
        }
        ctx.closePath();
    }

    function drawGlass3D(liveImage, glass, progress) {
        const isSnapped = progress >= 1;
        ctx.save();

        // Drop shadow (khi đã chụp)
        if (isSnapped) {
            buildPath(glass);
            ctx.save();
            ctx.shadowColor   = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur    = 40;
            ctx.shadowOffsetX = 18;
            ctx.shadowOffsetY = 18;
            ctx.fillStyle = 'black';
            ctx.fill();
            ctx.restore();
        }

        // Clip vùng hình
        buildPath(glass);
        ctx.clip();

        // Nội dung bên trong (zoom nhẹ tạo hiệu ứng khúc xạ khi snapped)
        const zoom = isSnapped ? 1.12 : 1.0;
        ctx.translate(glass.cx, glass.cy);
        ctx.scale(zoom, zoom);
        ctx.translate(-glass.cx, -glass.cy);
        ctx.drawImage(liveImage, 0, 0, canvasEl.width, canvasEl.height);

        // Chromatic aberration khi snapped
        if (isSnapped) {
            ctx.globalCompositeOperation = 'screen';
            ctx.globalAlpha = 0.07;
            ctx.translate(4, 0);
            ctx.drawImage(liveImage, 0, 0, canvasEl.width, canvasEl.height);
            ctx.translate(-8, 0);
            ctx.globalAlpha = 0.05;
            ctx.drawImage(liveImage, 0, 0, canvasEl.width, canvasEl.height);
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1;
        }

        ctx.restore();

        // Iridescent shimmer bên trong khi snapped
        if (isSnapped) {
            ctx.save();
            buildPath(glass);
            ctx.clip();
            const shimmer = ctx.createLinearGradient(
                glass.cx - 150, glass.cy - 150,
                glass.cx + 150, glass.cy + 150
            );
            shimmer.addColorStop(0,   'rgba(180, 160, 255, 0.18)');
            shimmer.addColorStop(0.4, 'rgba(120, 220, 255, 0.08)');
            shimmer.addColorStop(0.7, 'rgba(255, 200, 220, 0.12)');
            shimmer.addColorStop(1,   'rgba(160, 255, 200, 0.06)');
            ctx.fillStyle = shimmer;
            ctx.fill();
            ctx.restore();
        }

        // Viền kính
        ctx.save();
        buildPath(glass);

        if (isSnapped) {
            const bevel = ctx.createLinearGradient(
                glass.cx - 120, glass.cy - 120,
                glass.cx + 120, glass.cy + 120
            );
            bevel.addColorStop(0,    'rgba(255,255,255,0.95)');
            bevel.addColorStop(0.45, 'rgba(255,255,255,0.15)');
            bevel.addColorStop(1,    'rgba(180,180,180,0.55)');
            ctx.lineWidth   = 9;
            ctx.strokeStyle = bevel;
            ctx.stroke();

            buildPath(glass);
            ctx.lineWidth   = 2;
            ctx.strokeStyle = 'rgba(255,255,255,0.9)';
            ctx.stroke();
        } else {
            const t = Math.max(0, Math.min(1, progress));
            const r = Math.round(255 - (255 - 99)  * t);
            const g = Math.round(255 - (255 - 102) * t);
            const b = Math.round(255 - (255 - 241) * t);
            ctx.lineWidth   = 3 + 5 * t;
            ctx.strokeStyle = `rgba(${r},${g},${b},0.85)`;
            ctx.setLineDash([]);
            ctx.stroke();
        }
        ctx.restore();

        if (!isSnapped && progress > 0.05) {
            drawProgressRing(glass, progress);
        }
    }

    // Vòng tiến trình dạng dashes quanh hình
    function drawProgressRing(glass, progress) {
        ctx.save();

        let cx, cy, rx, ry;
        if (glass.type === 'circle') {
            cx = glass.cx; cy = glass.cy;
            rx = glass.rx * 1.25; ry = glass.ry * 1.25;
        } else if (glass.type === 'triangle') {
            cx = glass.cx; cy = glass.cy;
            const pts = [glass.p1, glass.p2, glass.p3];
            rx = ry = Math.max(...pts.map(p => Math.hypot(p.x - cx, p.y - cy))) * 1.2;
        } else {
            cx = glass.cx; cy = glass.cy;
            const pts = [glass.tl, glass.tr, glass.br, glass.bl];
            rx = ry = Math.max(...pts.map(p => Math.hypot(p.x - cx, p.y - cy))) * 1.18;
        }

        const perim   = 2 * Math.PI * Math.max(rx, ry);
        const dashLen = perim / 24;
        ctx.setLineDash([dashLen * 0.6, dashLen * 0.4]);

        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        ctx.lineWidth   = 2;
        ctx.strokeStyle = 'rgba(99,102,241,0.25)';
        ctx.stroke();

        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, -Math.PI / 2, 0, Math.PI * 2 * progress);
        ctx.lineWidth   = 3;
        ctx.strokeStyle = `rgba(139,92,246,${0.5 + 0.4 * progress})`;
        ctx.shadowColor = '#8b5cf6';
        ctx.shadowBlur  = 8;
        ctx.stroke();

        ctx.restore();
    }

    // Gesture detection
    function isFingerExtended(landmarks, tipIdx, pipIdx) {
        const wrist = landmarks[0];
        const tip   = landmarks[tipIdx];
        const pip   = landmarks[pipIdx];
        return Math.hypot(tip.x - wrist.x, tip.y - wrist.y) >
               Math.hypot(pip.x - wrist.x, pip.y - wrist.y);
    }

    // Tam giác: cái (4) + trỏ (8) + giữa (12), áp út gập
    function checkTriangleGesture(lm) {
        return  isFingerExtended(lm,  4,  3) &&
                isFingerExtended(lm,  8,  6) &&
                isFingerExtended(lm, 12, 10) &&
               !isFingerExtended(lm, 16, 14) &&
               !isFingerExtended(lm, 20, 18);
    }

    // L-Frame: cái + trỏ, 3 ngón còn lại gập
    function checkLFrameGesture(lm) {
        return  isFingerExtended(lm,  4,  3)  &&
                isFingerExtended(lm,  8,  6)  &&
               !isFingerExtended(lm, 12, 10) &&
               !isFingerExtended(lm, 16, 14) &&
               !isFingerExtended(lm, 20, 18);
    }

    // Vòng tròn kéo dãn: cái (4) + trỏ (8) + út (20), 2 tay
    function checkStretchCircleGesture(h1, h2) {
        return  isFingerExtended(h1,  4,  3) && isFingerExtended(h2,  4,  3) &&
                isFingerExtended(h1,  8,  6) && isFingerExtended(h2,  8,  6) &&
               !isFingerExtended(h1, 12, 10) && !isFingerExtended(h2, 12, 10) &&
               !isFingerExtended(h1, 16, 14) && !isFingerExtended(h2, 16, 14) &&
                isFingerExtended(h1, 20, 18) && isFingerExtended(h2, 20, 18);
    }

    function updateGestureTag(name) {
        if (name !== lastGesture) {
            lastGesture = name;
            gestureTagEl.textContent = name || '';
            gestureTagEl.classList.toggle('visible', !!name);
        }
    }

    function onResults(results) {
        if (!loadingEl.classList.contains('hidden')) {
            loadingEl.classList.add('hidden');
            setTimeout(() => { loadingEl.style.display = 'none'; }, 600);
        }

        const w = canvasEl.width  = videoEl.videoWidth  || 1280;
        const h = canvasEl.height = videoEl.videoHeight || 720;

        if (frozenCanvas.width !== w || frozenCanvas.height !== h) {
            frozenCanvas.width = w; frozenCanvas.height = h;
        }

        let currentGestureData = null;
        let gestureName        = null;

        if (results.multiHandLandmarks?.length > 0) {
            const hand1 = results.multiHandLandmarks[0];

            // Tam giác: cái + trỏ + giữa (1 tay)
            if (checkTriangleGesture(hand1)) {
                const p1 = { x: hand1[4].x  * w, y: hand1[4].y  * h };
                const p2 = { x: hand1[8].x  * w, y: hand1[8].y  * h };
                const p3 = { x: hand1[12].x * w, y: hand1[12].y * h };
                currentGestureData = {
                    type: 'triangle', p1, p2, p3,
                    cx: (p1.x + p2.x + p3.x) / 3,
                    cy: (p1.y + p2.y + p3.y) / 3,
                };
                gestureName = '🖖 TAM GIÁC';
            }

            if (results.multiHandLandmarks.length === 2) {
                const hand2     = results.multiHandLandmarks[1];
                const leftHand  = hand1[8].x < hand2[8].x ? hand1 : hand2;
                const rightHand = hand1[8].x < hand2[8].x ? hand2 : hand1;

                // Tứ giác 3D (L-Frame, 2 tay)
                if (checkLFrameGesture(hand1) && checkLFrameGesture(hand2)) {
                    const ex = 1.1;
                    const tl = { x: leftHand[8].x  * w, y: leftHand[8].y  * h };
                    const tr = { x: rightHand[8].x * w, y: rightHand[8].y * h };
                    const br = { x: rightHand[4].x * w, y: rightHand[4].y * h };
                    const bl = { x: leftHand[4].x  * w, y: leftHand[4].y  * h };
                    const cx = (tl.x + tr.x + br.x + bl.x) / 4;
                    const cy = (tl.y + tr.y + br.y + bl.y) / 4;
                    const expand = p => ({ x: cx + (p.x - cx) * ex, y: cy + (p.y - cy) * ex });
                    currentGestureData = { type: 'quad', tl: expand(tl), tr: expand(tr), br: expand(br), bl: expand(bl), cx, cy };
                    gestureName = '👆 TỨ GIÁC 3D';
                }

                // Vòng tròn kéo dãn: cái + trỏ + út (2 tay)
                else if (checkStretchCircleGesture(hand1, hand2)) {
                    const lIndex = { x: leftHand[8].x  * w, y: leftHand[8].y  * h };
                    const rIndex = { x: rightHand[8].x * w, y: rightHand[8].y * h };
                    const lThumb = { x: leftHand[4].x  * w, y: leftHand[4].y  * h };
                    const rThumb = { x: rightHand[4].x * w, y: rightHand[4].y * h };
                    const lPinky = { x: leftHand[20].x * w, y: leftHand[20].y * h };
                    const rPinky = { x: rightHand[20].x* w, y: rightHand[20].y* h };
                    // Tâm = trung điểm 2 cặp (trỏ+cái) của 2 tay
                    const lAnchor = { x: (lIndex.x + lThumb.x) / 2, y: (lIndex.y + lThumb.y) / 2 };
                    const rAnchor = { x: (rIndex.x + rThumb.x) / 2, y: (rIndex.y + rThumb.y) / 2 };
                    const cx = (lAnchor.x + rAnchor.x) / 2;
                    const cy = (lAnchor.y + rAnchor.y) / 2;
                    // rx: kéo 2 tay ra xa/gần → thay đổi chiều ngang
                    const rx = Math.hypot(lAnchor.x - rAnchor.x, lAnchor.y - rAnchor.y) / 2 * 1.1;
                    // ry: nâng/hạ ngón út → thay đổi chiều dọc
                    const pinkyMid = { x: (lPinky.x + rPinky.x) / 2, y: (lPinky.y + rPinky.y) / 2 };
                    const ry = Math.hypot(pinkyMid.x - cx, pinkyMid.y - cy) * 1.15;
                    const angle = Math.atan2(rAnchor.y - lAnchor.y, rAnchor.x - lAnchor.x);
                    currentGestureData = { type: 'circle', cx, cy, rx, ry, angle, isResizable: true };
                    gestureName = '🤙 VÒNG TRÒN';
                }
            }
        }

        updateGestureTag(gestureName);

        let currentProgress = 0;

        if (currentGestureData) {
            if (!isCooldown) {
                if (frozenGlass) frozenGlass = null;

                if (lastPos) {
                    const dist = Math.hypot(lastPos.cx - currentGestureData.cx, lastPos.cy - currentGestureData.cy);
                    if (dist < STABILITY_THRESHOLD) {
                        if (snapTimer === 0) snapTimer = Date.now();
                        currentProgress = (Date.now() - snapTimer) / SNAP_DELAY;
                        if (currentProgress >= 1) {
                            frozenGlass = currentGestureData;
                            frozenCtx.drawImage(results.image, 0, 0, w, h);
                            isCooldown      = true;
                            snapTimer       = 0;
                            currentProgress = 0;
                            flashFrames     = 10;
                            hudEl.classList.add('hidden');
                        }
                    } else {
                        snapTimer = 0;
                        lastPos   = currentGestureData;
                    }
                } else {
                    lastPos   = currentGestureData;
                    snapTimer = Date.now();
                }
            }
            activeGlass = currentGestureData;
        } else {
            activeGlass = null;
            lastPos     = null;
            snapTimer   = 0;
            isCooldown  = false;
        }

        ctx.clearRect(0, 0, w, h);

        const usesFrozenBg = frozenGlass && !activeGlass;
        ctx.drawImage(usesFrozenBg ? frozenCanvas : results.image, 0, 0, w, h);

        if (frozenGlass && !activeGlass) {
            drawGlass3D(results.image, frozenGlass, 1.0);
        }

        if (activeGlass && !isCooldown) {
            drawGlass3D(results.image, activeGlass, currentProgress);
        }

        if (results.multiHandLandmarks && !frozenGlass) {
            for (const hand of results.multiHandLandmarks) {
                drawConnectors(ctx, hand, HAND_CONNECTIONS, { color: 'rgba(255,255,255,0.1)', lineWidth: 2 });
                drawLandmarks(ctx, hand, { color: 'rgba(255,255,255,0.3)', lineWidth: 1, radius: 2 });
            }
        }

        if (flashFrames > 0) {
            ctx.fillStyle = `rgba(255,255,255,${flashFrames * 0.09})`;
            ctx.fillRect(0, 0, w, h);
            flashFrames--;
        }
    }

    const hands = new Hands({
        locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands:            2,
        modelComplexity:        1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence:  0.5,
    });

    hands.onResults(onResults);

    const camera = new Camera(videoEl, {
        onFrame: async () => { await hands.send({ image: videoEl }); },
        width:  1280,
        height: 720,
    });

    camera.start().catch(err => {
        console.error('Camera error:', err);
        loadingEl.style.display = 'none';
        errorEl.classList.add('visible');
    });
</script>
</body>
</html>
